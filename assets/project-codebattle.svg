<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 270" width="100%">
  <style>
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #c9d1d9; font-size: 14px; }
    .title { font-weight: bold; font-size: 16px; fill: #ffffff; }
    .bold { font-weight: bold; fill: #ffffff; }
    .link { fill: #58a6ff; text-decoration: underline; }
  </style>
  
  <rect x="1" y="1" width="798" height="268" rx="6" fill="#000000" stroke="#30363d" stroke-width="1.5"/>

  <text x="400" y="35" text-anchor="middle" class="text title">Проект: Codebattle</text>

  <text x="30" y="75" class="text">Опенсорс-платформа для соревновательного программирования. Проводил полное функциональное и</text>
  <text x="30" y="97" class="text">нефункциональное тестирование, баг репортинг, регрессионное тестирование.</text>

  <text x="45" y="140" class="text">🔧 <tspan class="bold">Стек:</tspan> Chrome DevTools, Тест-дизайн</text>
  <text x="45" y="170" class="text">📝 <tspan class="bold">Документация:</tspan> <tspan class="link">Тест-кейсы</tspan>, <tspan class="link">issues</tspan></text>
  <text x="45" y="200" class="text">🐞 <tspan class="bold">Результат:</tspan> Обнаружено и задокументировано 4 бага (UI, Localization, Security)</text>

  <g transform="translate(325, 225)">
    <rect width="150" height="28" rx="4" fill="#7B2CBF" />
    <text x="75" y="19" text-anchor="middle" class="text bold" style="font-size: 12px; fill: #ffffff;">ПОСМОТРЕТЬ ПРОЕКТ</text>
  </g>
</svg>
