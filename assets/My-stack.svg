<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="100%">
  <style>
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #c9d1d9; font-size: 13.5px; }
    .category { font-weight: bold; fill: #ffffff; }
    .header { font-weight: bold; font-size: 14px; fill: #ffffff; }
  </style>
  
  <rect x="1" y="1" width="798" height="338" rx="6" fill="#000000" stroke="#30363d" stroke-width="1.5"/>

  <rect x="1" y="1" width="200" height="40" rx="6" fill="#0d1117" />
  <rect x="201" y="1" width="598" height="40" rx="6" fill="#0d1117" />
  <text x="100" y="26" text-anchor="middle" class="text header">Категория</text>
  <text x="500" y="26" text-anchor="middle" class="text header">Инструменты и ключевые навыки</text>

  <line x1="1" y1="40" x2="800" y2="40" stroke="#30363d" />
  <line x1="200" y1="1" x2="200" y2="340" stroke="#30363d" />
  
  <text x="25" y="70" class="text category">🛠 Инструменты</text>
  <text x="215" y="70" class="text">Postman (API/HTTP), Chrome DevTools, Git, SQL, HTML5, CSS3, VS Code</text>
  <line x1="1" y1="90" x2="800" y2="90" stroke="#30363d" stroke-opacity="0.5" />

  <text x="25" y="120" class="text category">📄 Документация</text>
  <text x="215" y="120" class="text">Test Cases, Bug Reports, Checklists, YAML, Markdown, Jira/YouTrack</text>
  <line x1="1" y1="140" x2="800" y2="140" stroke="#30363d" stroke-opacity="0.5" />

  <text x="25" y="170" class="text category">🔍 Тестирование</text>
  <text x="215" y="170" class="text">Manual Testing, Web &amp; Prod, Regression, SPA, Non-functional, SDLC &amp; STLC</text>
  <line x1="1" y1="190" x2="800" y2="190" stroke="#30363d" stroke-opacity="0.5" />

  <text x="25" y="220" class="text category">🎯 Тест-дизайн</text>
  <text x="215" y="220" class="text">Equivalence Partitioning, Boundary Value Analysis, Decision Table, Pairwise</text>
  <line x1="1" y1="240" x2="800" y2="240" stroke="#30363d" stroke-opacity="0.5" />

  <text x="25" y="270" class="text category">🤖 Автоматизация</text>
  <text x="215" y="270" class="text">Понимание видов автотестов (Unit, API, UI) и принципов их применения</text>
  <line x1="1" y1="290" x2="800" y2="290" stroke="#30363d" stroke-opacity="0.5" />

  <text x="25" y="320" class="text category">🤝 Soft / Команда</text>
  <text x="215" y="320" class="text">Коммуникация, взаимодействие с заказчиком, внимание к деталям</text>
</svg>
